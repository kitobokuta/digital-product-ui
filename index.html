<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiter Store</title>
    <style>
        body {
            background-color: #070a13;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
        }

        .store-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .store-header h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .store-header p {
            margin: 0;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* ပထမပုံစံအတိုင်း ၂ ကော်လံ Grid ဒီဇိုင်း */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 450px;
            margin: 0 auto;
        }

        /* ကတ်ပြားဒီဇိုင်း */
        .product-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 18px 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-card:active {
            transform: scale(0.96);
        }

        .product-number {
            font-size: 11px;
            color: #64748b;
            text-align: left;
            margin-bottom: 10px;
            padding-left: 6px;
        }

        .product-icon {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle, #1e293b 0%, #0b0f19 100%);
            border: 2px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.1);
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .product-footer {
            font-size: 12px;
            color: #f59e0b; /* ရွှေရောင်ဘုရင်သရဖူ 👑 */
        }

        /* Loading နဲ့ Error အခြေအနေများ */
        .status-message {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="store-header">
        <h2>JUPITER STORE</h2>
        <p>✦ PREMIUM DIGITAL PRODUCTS ✦</p>
    </div>

    <!-- ထုတ်ကုန်များပေါ်လာမည့် Container -->
    <div id="shop-container">
        <div class="status-message" id="loadingText">Loading products...</div>
    </div>

    <script>
        // ပေးထားသော Google Apps Script Data Catalog URL
        const CATALOG_URL = "https://script.google.com/macros/s/AKfycbya5HrCRRjZRSNOubOhBHBU9M49ruZ-xIKuKIYvgN_5fu-jjpIYv7fKoUh7cAsFVNSb/exec";

        async function fetchProducts() {
            const container = document.getElementById('shop-container');
            
            try {
                // Google Apps Script ကို Fetch လုပ်ရာတွင် CORS Error မတက်စေရန် mode: 'cors' (သို့မဟုတ်) no-cors သုံးနိုင်သည်
                // သို့သော် JSON ဒေတာ အမှန်တကယ်ဖတ်ရန် standard fetch ကို သုံးရပါမည်။
                const response = await fetch(CATALOG_URL, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // ဒေတာ ရလာပါက ဇယားကွက်ပုံစံ ဖော်ပြမည်
                renderProducts(data);

            } catch (error) {
                console.error("Error fetching products:", error);
                
                // Fetch လုပ်၍မရပါက (သို့မဟုတ် Apps Script ဘက်က JSON ပုံစံမမှန်သေးပါက) 
                // UI ပုံစံကွက်တိပေါ်နေစေရန် နမူနာဒေတာဖြင့် အစားထိုးပြသပေးပါမည် (Fallback)
                console.log("Using fallback mock data due to network/CORS restriction.");
                const fallbackProducts = [
                    { name: "CapCut Pro", icon: "C" },
                    { name: "Spotify Premium", icon: "S" },
                    { name: "Canva Pro", icon: "C" },
                    { name: "Channel Boost", icon: "C" },
                    { name: "Jump Jump VPN", icon: "J" },
                    { name: "Hiddify / V2BOX VPN", icon: "H" }
                ];
                renderProducts(fallbackProducts);
            }
        }

        function renderProducts(items) {
            const container = document.getElementById('shop-container');

            if (!items || items.length === 0) {
                container.innerHTML = `<div class="status-message">No products available.</div>`;
                return;
            }

            let htmlContent = '<div class="products-grid">';

            items.forEach((item, index) => {
                let formattedNum = String(index + 1).padStart(2, '0');
                // Google Sheet က လာမည့် Key နာမည်များ (ဥပမာ: item.name သို့မဟုတ် item.productName) ကို ကိုက်ညီအောင် စစ်ဆေးပေးရန်
                let pName = item.name || item.productName || "Digital Product";
                let pIcon = item.icon || pName.charAt(0).toUpperCase();

                htmlContent += `
                    <div class="product-card" onclick="selectProduct('${pName}')">
                        <div class="product-number">${formattedNum}</div>
                        <div class="product-icon">${pIcon}</div>
                        <div class="product-name">${pName}</div>
                        <div class="product-footer">👑</div>
                    </div>
                `;
            });

            htmlContent += '</div>';
            container.innerHTML = htmlContent;
        }

        function selectProduct(productName) {
            // ကတ်ပြားကို နှိပ်လိုက်ပါက လုပ်ဆောင်မည့် အပိုင်း (Telegram Bot သို့ ပို့ရန် စသည်ဖြင့်)
            console.log("Selected:", productName);
            // alert(productName + "ကို ရွေးချယ်ထားပါသည်။");
        }

        // စတင် လုပ်ဆောင်ရန်
        fetchProducts();
    </script>

</body>
</html>
