<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --card-border: #1f2937;
            --accent-silver: #94a3b8;
            --accent-glow: #e2e8f0;
            --text-color: #ffffff;
            --text-secondary: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Loading Screen (Black & Silver Theme with Planet Ring) */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .jupiter-container {
            position: relative;
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .jupiter-planet {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #cbd5e1, #334155);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(148, 163, 184, 0.3);
            z-index: 2;
        }

        .jupiter-ring {
            position: absolute;
            width: 90px;
            height: 34px;
            border: 2px solid rgba(226, 232, 240, 0.8);
            border-radius: 50%;
            transform: rotate(-25deg);
            animation: spinRing 1.8s linear infinite;
            z-index: 3;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        @keyframes spinRing {
            0% { transform: rotate(-25deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(-25deg) scale(1.06); opacity: 1; }
            100% { transform: rotate(-25deg) scale(1); opacity: 0.8; }
        }

        .loader-text {
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--accent-silver);
            font-weight: 600;
        }

        /* Container Views */
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }

        /* Store Header - Updated with Planet & Serif Metallic Font */
        .store-header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 10px;
        }

        .store-logo-container {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .store-logo-planet {
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 30% 30%, #cbd5e1, #334155);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(148, 163, 184, 0.4);
            z-index: 2;
        }

        .store-logo-ring {
            position: absolute;
            width: 70px;
            height: 26px;
            border: 1.5px solid rgba(226, 232, 240, 0.9);
            border-radius: 50%;
            transform: rotate(-25deg);
            z-index: 3;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .store-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(180deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(148, 163, 184, 0.2);
        }

        .store-header p {
            font-size: 11px;
            color: var(--accent-silver);
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 18px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .product-card:active {
            transform: scale(0.97);
            border-color: var(--accent-silver);
        }

        .product-icon {
            width: 44px;
            height: 44px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            color: var(--accent-glow);
            font-weight: bold;
            font-size: 16px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
        }

        /* Second UI Styles (Plan/Type List) */
        .back-btn {
            background: none;
            border: none;
            color: var(--accent-silver);
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-product-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sub-product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .sub-product-card:active {
            transform: scale(0.98);
            border-color: var(--accent-silver);
        }

        .sub-info .sub-type {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .sub-info .sub-price {
            font-size: 12px;
            color: var(--accent-silver);
            font-weight: 600;
        }

        .select-arrow {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Third UI Styles (Details, Note & Order Form) */
        .details-container {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: var(--text-secondary);
        }

        .info-value {
            font-weight: 600;
        }

        /* Floating Placeholder Input Box */
        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .note-input {
            width: 100%;
            background-color: #080c14;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 14px 12px;
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            resize: none;
            height: 90px;
            transition: border-color 0.2s;
        }

        .note-input:focus {
            border-color: var(--accent-silver);
        }

        .floating-placeholder {
            position: absolute;
            top: 14px;
            left: 13px;
            color: var(--text-secondary);
            font-size: 12px;
            pointer-events: none;
            transition: opacity 0.2s ease;
            line-height: 1.4;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #334155, #1e293b);
            border: 1px solid #475569;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }

        .action-btn:active {
            opacity: 0.8;
        }
    </style>
</head>

        <div class="sub-product-list" id="subProductList">

    </div>

        <!-- Note Input Box -->

            <div class="input-group">

            <button class="action-btn" onclick="submitOrder()">Confirm & Order Now</button>

    </div>

        let selectedProductData = {
            name: '',
            type: '',
            priceText: '',
            costPrice: 0
        };

        function renderMainProducts() {
            const grid = document.getElementById('mainProductGrid');
            grid.innerHTML = '';

            const uniqueNames = [...new Set(productsDatabase.map(p => p.name))];

            uniqueNames.forEach(name => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openSubProducts(name);
                
                const iconChar = name.charAt(0).toUpperCase();

                card.innerHTML = `
                    <div class="product-icon">${iconChar}</div>
                    <div class="product-name">${name}</div>
                `;
                grid.appendChild(card);
            });
        }

        window.addEventListener("load", () => {
            renderMainProducts();
            setTimeout(() => {
                const loader = document.getElementById("loader");
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                }, 400);
            }, 600);
        });

        function openSubProducts(productName) {
            document.getElementById('selected-product-title').innerText = productName.toUpperCase();
            const subList = document.getElementById('subProductList');
            subList.innerHTML = '';

            const filteredItems = productsDatabase.filter(p => p.name === productName);

            filteredItems.forEach(item => {
                const subCard = document.createElement('div');
                subCard.className = 'sub-product-card';
                subCard.onclick = () => openOrderDetails(item.name, item.type, item.priceText, item.costPrice);

                subCard.innerHTML = `
                    <div class="sub-info">
                        <div class="sub-type">${item.type}</div>
                        <div class="sub-price">${item.priceText}</div>
                    </div>
                    <div class="select-arrow">❯</div>
                `;
                subList.appendChild(subCard);
            });

            document.getElementById('view-1').classList.remove('active');
            document.getElementById('view-2').classList.add('active');
        }

        function openOrderDetails(name, type, priceText, costPrice) {
            selectedProductData.name = name;
            selectedProductData.type = type;
            selectedProductData.priceText = priceText;
            selectedProductData.costPrice = costPrice;

            document.getElementById('summary-name').innerText = name;
            document.getElementById('summary-type').innerText = type;
            document.getElementById('summary-price').innerText = priceText;

            document.getElementById('view-2').classList.remove('active');
            document.getElementById('view-3').classList.add('active');
        }

            document.getElementById('view-2').classList.remove('active');
            document.getElementById('view-1').classList.add('active');

            const placeholder = document.getElementById('customPlaceholder');

                placeholder.style.opacity = '0';
            } else {
                placeholder.style.opacity = '1';
            }
        }

        function submitOrder() {
            const customerNote = document.getElementById('customerNote').value.trim() || "-";

            const orderData = {
                order_id: "ORD-" + Math.floor(100000000 + Math.random() * 900000000),
                full_item_name: `${selectedProductData.name} (${selectedProductData.type})`,
                price: selectedProductData.priceText.replace(/[^0-9]/g, ''),
                cost_price: selectedProductData.costPrice,
                customer_note: customerNote
            };

            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }
    </script>
</body>
</html>
