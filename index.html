<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiter Store</title>
    <style>
        body {
            background-color: #0b0f17;
            color: #e2e8f0;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 70px;
        }

        .store-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .store-header h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            letter-spacing: 1.5px;
            font-weight: 800;
            color: #ffffff;
        }

        .store-header p {
            margin: 0;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* Products Grid (Phone & Laptop Responsive) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Product Card Design (Black & Silver Theme) */
        .product-card {
            background-color: #121824;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 18px 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .product-card:hover {
            border-color: #64748b;
            transform: translateY(-2px);
        }

        .product-number {
            font-size: 11px;
            color: #64748b;
            text-align: left;
            margin-bottom: 10px;
            padding-left: 6px;
        }

        .product-icon {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle, #1e293b 0%, #0b0f17 100%);
            border: 2px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .product-footer {
            font-size: 12px;
            color: #f59e0b;
        }

        /* Form Container (Second / Third UI) */
        .order-form-container {
            display: none;
            max-width: 450px;
            margin: 20px auto;
            background-color: #121824;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .order-form-container h3 {
            margin-top: 0;
            font-size: 16px;
            color: #cbd5e1;
            text-align: center;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        /* Select box with custom clean down arrow */
        .form-group select {
            width: 100%;
            background-color: #0b0f17;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            color: #ffffff;
            font-size: 13px;
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%2394a3b8' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position-x: 98%;
            background-position-y: center;
            cursor: pointer;
        }

        .form-group input {
            width: 100%;
            background-color: #0b0f17;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            color: #ffffff;
            font-size: 13px;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #64748b;
        }

        /* Note Box (Black & Silver Theme) */
        .note-box {
            font-size: 11px;
            color: #cbd5e1;
            background: #0b0f17;
            border: 1px solid #1e293b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .price-tag {
            color: #10b981;
            font-weight: bold;
        }

        .duration-tag {
            color: #ef4444;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .back-btn {
            background-color: #1e293b;
            color: #cbd5e1;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 30%;
        }

        .order-btn {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 70%;
            transition: background 0.2s;
        }

        .order-btn:hover {
            background-color: #475569;
        }

        /* Fixed Footer Features Bar */
        .store-features-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #0b0f17;
            border-top: 1px solid #1e293b;
            display: flex;
            justify-content: space-around;
            padding: 8px 5px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .feature-item {
            text-align: center;
            font-size: 9px;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .feature-item span {
            display: block;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .loading-state {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="store-header">
        <h2>JUPITER STORE</h2>
        <p>✦ PREMIUM DIGITAL PRODUCTS ✦</p>
    </div>

    <!-- Product Catalog Grid -->
    <div id="catalog-container" class="products-grid">
        <div class="loading-state">Loading products from sheet...</div>
    </div>

    <!-- Order Form Container (Second & Third UI) -->
    <div id="form-container" class="order-form-container">
        <h3 id="selected-title">Order Product</h3>
        
        <div class="note-box" id="product-info-box">
            <div><span class="duration-tag">⏱️ <span id="display-duration">1 Month</span></span></div>
            <div style="margin-top: 4px;">Price: <span id="display-price" class="price-tag">5,000 MMK</span></div>
            <div style="margin-top: 8px; color: #94a3b8;" id="display-note">ℹ️ Note: ညွှန်ကြားချက်...</div>
        </div>
        
        <form id="purchaseForm" onsubmit="submitOrder(event)">
            <div class="form-group">
                <label>Select Package Type</label>
                <select id="productType" onchange="updatePackageDetails()">
                    <!-- JS ဖြင့် Data ထည့်မည် -->
                </select>
            </div>

            <div class="form-group">
                <label>Gmail Address (Optional)</label>
                <input type="email" id="gmail" placeholder="user@gmail.com">
            </div>

            <div class="btn-group">
                <button type="button" class="back-btn" onclick="goBack()">Back</button>
                <button type="submit" class="order-btn">Order Now</button>
            </div>
        </form>
    </div>

    <!-- Fixed Features Bar -->
    <div class="store-features-bar">
        <div class="feature-item"><span>🛡️</span> 100% SAFE & SECURE</div>
        <div class="feature-item"><span>⚡</span> INSTANT DELIVERY</div>
        <div class="feature-item"><span>🎖️</span> PREMIUM QUALITY</div>
        <div class="feature-item"><span>🎧</span> 24/7 SUPPORT</div>
    </div>

    <script>
        const CATALOG_URL = "https://script.google.com/macros/s/AKfycbya5HrCRRjZRSNOubOhBHBU9M49ruZ-xIKuKIYvgN_5fu-jjpIYv7fKoUh7cAsFVNSb/exec";
        
        let allProductsData = {};
        let currentVariants = [];

        const catalogContainer = document.getElementById('catalog-container');
        const formContainer = document.getElementById('form-container');
        const selectedTitle = document.getElementById('selected-title');
        const displayDuration = document.getElementById('display-duration');
        const displayPrice = document.getElementById('display-price');
        const displayNote = document.getElementById('display-note');
        const productTypeSelect = document.getElementById('productType');

        async function fetchCatalog() {
            try {
                const response = await fetch(CATALOG_URL, { method: 'GET', redirect: "follow" });
                const data = await response.json();
                
                // Group products by Name (ဥပမာ - CapCut အမျိုးအစား ၅ ခုရှိလျှင် တစ်စုတည်းစုရန်)
                allProductsData = {};
                data.forEach(item => {
                    let name = item.name || item.productName || "Product";
                    if (!allProductsData[name]) {
                        allProductsData[name] = [];
                    }
                    allProductsData[name].push(item);
                });

                renderCatalog();
            } catch (error) {
                console.error("Error loading sheet data:", error);
                catalogContainer.innerHTML = `<div class="loading-state" style="color: #ef4444;">Failed to load catalog data.</div>`;
            }
        }

        function renderCatalog() {
            let html = '';
            let index = 1;
            
            for (let productName in allProductsData) {
                let numStr = String(index).padStart(2, '0');
                let firstItem = allProductsData[productName][0];
                let pIcon = firstItem.icon || productName.charAt(0).toUpperCase();

                html += `
                    <div class="product-card" onclick="selectProduct('${productName}')">
                        <div class="product-number">${numStr}</div>
                        <div class="product-icon">${pIcon}</div>
                        <div class="product-name">${productName}</div>
                        <div class="product-footer">👑</div>
                    </div>
                `;
                index++;
            }
            catalogContainer.innerHTML = html;
        }

        function selectProduct(productName) {
            currentVariants = allProductsData[productName];
            selectedTitle.innerText = `Order: ${productName}`;

            // Populate Dropdown Options
            let optionsHtml = '';
            currentVariants.forEach((variant, idx) => {
                let vType = variant.type || variant.duration || `Package ${idx + 1}`;
                let vPrice = variant.price || "0 MMK";
                optionsHtml += `<option value="${idx}">${vType} - ${vPrice}</option>`;
            });
            productTypeSelect.innerHTML = optionsHtml;

            updatePackageDetails();

            // Switch UI views
            catalogContainer.style.display = 'none';
            formContainer.style.display = 'block';
            window.scrollTo({ top: 100, behavior: 'smooth' });
        }

        function updatePackageDetails() {
            let selectedIdx = productTypeSelect.value;
            if (currentVariants[selectedIdx]) {
                let variant = currentVariants[selectedIdx];
                displayDuration.innerText = variant.type || variant.duration || "Standard";
                displayPrice.innerText = variant.price || "0 MMK";
                displayNote.innerText = `ℹ️ Note: ${variant.note || "အချက်အလက်မရှိပါ။"}`;
            }
        }

        function goBack() {
            formContainer.style.display = 'none';
            catalogContainer.style.display = 'grid';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function submitOrder(event) {
            event.preventDefault();

            let selectedIdx = productTypeSelect.value;
            let chosenVariant = currentVariants[selectedIdx];

            const orderData = {
                product: chosenVariant.name || chosenVariant.productName,
                type: chosenVariant.type || chosenVariant.duration,
                price: chosenVariant.price,
                gmail: document.getElementById('gmail').value || "Not provided"
            };

            console.log("Submitting order to Python Bot:", orderData);

            // Web App က အောက်ဆုံးသို့ တန်းကျသွားခြင်း (Scroll to bottom)
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            alert("Order submitted successfully! Python bot will process your request.");
            
            document.getElementById('purchaseForm').reset();
            goBack();
        }

        // စတင်ချိန်တွင် Google Sheet ဒေတာများကို ဖတ်ယူရန်
        fetchCatalog();
    </script>

</body>
</html>
