<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jupiter Store</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131b2e;
            --accent-color: #ff9933;
            --text-color: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Loading Screen - အလယ်တည့်တည့်နှင့် Graphic Animation ဆန်ဆန် */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .jupiter-container {
            position: relative;
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .jupiter-planet {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #ff9933, #cc5500);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 153, 51, 0.5);
            z-index: 2;
        }

        .jupiter-ring {
            position: absolute;
            width: 95px;
            height: 35px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transform: rotate(-25deg);
            animation: spinRing 1.8s linear infinite;
            z-index: 3;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        @keyframes spinRing {
            0% { transform: rotate(-25deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(-25deg) scale(1.06); opacity: 1; }
            100% { transform: rotate(-25deg) scale(1); opacity: 0.8; }
        }

        .loader-text {
            margin-top: 20px;
            font-size: 13px;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Store Header */
        .store-header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 10px;
        }

        .store-header h1 {
            font-size: 22px;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .store-header p {
            font-size: 12px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .product-card:active {
            transform: scale(0.97);
            border-color: var(--accent-color);
        }

        .product-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 153, 51, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 18px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .product-price {
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="jupiter-container">
            <div class="jupiter-planet"></div>
            <div class="jupiter-ring"></div>
        </div>
        <div class="loader-text">JUPITER STORE...</div>
    </div>

    <!-- Store Content -->
    <div class="store-header">
        <h1>JUPITER STORE</h1>
        <p>✦ PREMIUM DIGITAL PRODUCTS ✦</p>
    </div>

    <div class="product-grid" id="productGrid">
        <!-- Products will be loaded dynamically or statically -->
        <div class="product-card" onclick="selectProduct('CapCut Pro', '15000', 10000)">
            <div class="product-icon">C</div>
            <div class="product-name">CapCut Pro</div>
            <div class="product-price">15,000 MMK</div>
        </div>
        <div class="product-card" onclick="selectProduct('Spotify Premium', '12000', 8000)">
            <div class="product-icon">S</div>
            <div class="product-name">Spotify</div>
            <div class="product-price">12,000 MMK</div>
        </div>
        <div class="product-card" onclick="selectProduct('Canva Pro', '10000', 6000)">
            <div class="product-icon">C</div>
            <div class="product-name">Canva Pro</div>
            <div class="product-price">10,000 MMK</div>
        </div>
        <div class="product-card" onclick="selectProduct('Channel Boost', '20000', 14000)">
            <div class="product-icon">B</div>
            <div class="product-name">Channel Boost</div>
            <div class="product-price">20,000 MMK</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        // 1. Mini App ကို ဖန်သားပြင်အပြည့် (အပေါ်ဆုံးထိ) အလိုအလျောက် ဆွဲတင်ရန်
        tg.expand();
        tg.ready();

        // 2. Loading Screen အလုပ်လုပ်ပုံ (Store Load ပြီးပါက ဝင်ဆံ့ရန်)
        window.addEventListener("load", () => {
            setTimeout(() => {
                const loader = document.getElementById("loader");
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                }, 400);
            }, 600); // 0.6 စက္ကန့်ကြာပြီးနောက် Loader ပျောက်သွားမည်
        });

        // 3. ပစ္စည်းနှိပ်လိုက်ပါက Bot ထံသို့ Data ပို့ပေးမည့် Function
        function selectProduct(itemName, price, costPrice) {
            const orderData = {
                order_id: "ORD-" + Math.floor(100000000 + Math.random() * 900000000),
                full_item_name: itemName,
                price: price,
                cost_price: costPrice,
                customer_note: "Web App Order"
            };

            // Telegram Bot ထံသို့ Data ပို့ပြီး Mini App ပိတ်မည်
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }
    </script>
</body>
</html>
