<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiter Store</title>
    <style>
        body {
            background-color: #070a13;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
        }

        .store-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .store-header h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .store-header p {
            margin: 0;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* Responsive Grid: ဖုန်းမှာ ၂ ကော်လံ၊ Laptop/Desktop မှာ ၃ သို့မဟုတ် ၄ ကော်လံ အလိုအလျောက်ပြောင်းမည် */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ကတ်ပြားဒီဇိုင်း */
        .product-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .product-number {
            font-size: 11px;
            color: #64748b;
        }

        .product-footer {
            font-size: 12px;
            color: #f59e0b;
        }

        .product-icon {
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #1e293b 0%, #0b0f19 100%);
            border: 2px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px auto;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            color: #f1f5f9;
        }

        /* Price နဲ့ Type ပေါ်မည့်နေရာ */
        .product-details {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 10px;
            background: #0b0f19;
            padding: 6px;
            border-radius: 8px;
        }

        .product-price {
            color: #10b981;
            font-weight: bold;
        }

        /* Order Now ခလုတ် */
        .order-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .order-btn:hover {
            background-color: #1d4ed8;
        }

        .status-message {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="store-header">
        <h2>JUPITER STORE</h2>
        <p>✦ PREMIUM DIGITAL PRODUCTS ✦</p>
    </div>

    <!-- ထုတ်ကုန်များပေါ်လာမည့် Container -->
    <div id="shop-container">
        <div class="status-message" id="loadingText">Loading products...</div>
    </div>

    <script>
        const CATALOG_URL = "https://script.google.com/macros/s/AKfycbya5HrCRRjZRSNOubOhBHBU9M49ruZ-xIKuKIYvgN_5fu-jjpIYv7fKoUh7cAsFVNSb/exec";

        async function fetchProducts() {
            const container = document.getElementById('shop-container');
            
            try {
                const response = await fetch(CATALOG_URL, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                renderProducts(data);

            } catch (error) {
                console.error("Error fetching products:", error);
                
                // Fetch လုပ်၍မရပါက Price, Type, Order Now ခလုတ်များပါဝင်သော နမူနာဒေတာဖြင့် ပြသရန်
                const fallbackProducts = [
                    { name: "CapCut Pro", icon: "C", type: "1 Month", price: "5,000 MMK" },
                    { name: "Spotify Premium", icon: "S", type: "Individual", price: "4,500 MMK" },
                    { name: "Canva Pro", icon: "C", type: "1 Year", price: "3,500 MMK" },
                    { name: "Channel Boost", icon: "C", type: "Standard", price: "6,000 MMK" },
                    { name: "Jump Jump VPN", icon: "J", type: "VIP", price: "3,000 MMK" },
                    { name: "Hiddify / V2BOX", icon: "H", type: "Unlimited", price: "4,000 MMK" }
                ];
                renderProducts(fallbackProducts);
            }
        }

        function renderProducts(items) {
            const container = document.getElementById('shop-container');

            if (!items || items.length === 0) {
                container.innerHTML = `<div class="status-message">No products available.</div>`;
                return;
            }

            let htmlContent = '<div class="products-grid">';

            items.forEach((item, index) => {
                let formattedNum = String(index + 1).padStart(2, '0');
                let pName = item.name || item.productName || "Digital Product";
                let pIcon = item.icon || pName.charAt(0).toUpperCase();
                let pType = item.type || item.productType || "Standard";
                let pPrice = item.price || "Check Price";

                htmlContent += `
                    <div class="product-card">
                        <div>
                            <div class="card-top">
                                <div class="product-number">${formattedNum}</div>
                                <div class="product-footer">👑</div>
                            </div>
                            <div class="product-icon">${pIcon}</div>
                            <div class="product-name">${pName}</div>
                            <div class="product-details">
                                Type: <b>${pType}</b><br>
                                Price: <span class="product-price">${pPrice}</span>
                            </div>
                        </div>
                        <button class="order-btn" onclick="orderProduct('${pName}', '${pType}', '${pPrice}')">Order Now</button>
                    </div>
                `;
            });

            htmlContent += '</div>';
            container.innerHTML = htmlContent;
        }

        function orderProduct(name, type, price) {
            // Order Now နှိပ်လိုက်ပါက လုပ်ဆောင်မည့် အပိုင်း (Telegram Bot သို့မဟုတ် Checkout သို့ ပို့ရန်)
            alert(`${name} (${type}) - ${price} ကို ဝယ်ယူရန် ရွေးချယ်ထားပါသည်။`);
        }

        fetchProducts();
    </script>

</body>
</html>
