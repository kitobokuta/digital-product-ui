<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUPITER UNIVERSE Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f4f6f8);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --btn-color: var(--tg-theme-button-color, #2AABEE);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--btn-color);
            display: none;
            padding: 0;
            line-height: 1;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .info-title {
            font-weight: 600;
            font-size: 15px;
        }

        .info-sub {
            font-size: 12px;
            color: var(--hint-color);
            margin-top: 3px;
        }

        .price-text {
            font-size: 14px;
            font-weight: bold;
            color: #10b981;
            margin-top: 4px;
        }

        .select-btn {
            background-color: var(--btn-color);
            color: var(--btn-text);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
        }

        .select-btn:active {
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--hint-color);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" id="back-btn" onclick="showMainPage()">⬅</button>
        <h2 class="title" id="page-title">📦 Select Product</h2>
    </div>

    <div id="loading" class="loading">Loading Database...</div>
    <div class="grid" id="container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 🔗 Boss ရဲ့ Google Sheet Live API URL
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzUIf5yy0TBBCGyVQCa724hv1FBJkZrApdvSACYrNopzCsyZHnixk-wgHx03lVnqRk/exec";

        let rawProducts = [];
        let groupedProducts = {};

        async function fetchProducts() {
            try {
                const res = await fetch(GOOGLE_SHEET_API_URL);
                rawProducts = await res.json();
                groupData();
                showMainPage();
            } catch (err) {
                document.getElementById('loading').innerText = "Database မတက်နိုင်ပါ။ Sheet API Link ကို စစ်ဆေးပါခင်ဗျာ။";
            }
        }

        function groupData() {
            groupedProducts = {};
            rawProducts.forEach(item => {
                if (!groupedProducts[item.name]) {
                    groupedProducts[item.name] = [];
                }
                groupedProducts[item.name].push(item);
            });
        }

        function showMainPage() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('page-title').innerText = "📦 Select Product";

            const container = document.getElementById('container');
            container.innerHTML = '';

            Object.keys(groupedProducts).forEach(prodName => {
                const count = groupedProducts[prodName].length;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showDetailPage(prodName);
                card.innerHTML = `
                    <div>
                        <div class="info-title">${prodName}</div>
                        <div class="info-sub">${count} Plan Options Available</div>
                    </div>
                    <div style="color: var(--hint-color); font-weight: bold;">❯</div>
                `;
                container.appendChild(card);
            });
        }

        function showDetailPage(prodName) {
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('page-title').innerText = prodName;

            const container = document.getElementById('container');
            container.innerHTML = '';

            const items = groupedProducts[prodName];
            items.forEach(item => {
                const formattedPrice = Number(item.price).toLocaleString();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <div class="info-title">${item.plan} (${item.duration})</div>
                        <div class="info-sub">${item.note ? item.note : 'Instant Delivery'}</div>
                        <div class="price-text">${formattedPrice} MMK</div>
                    </div>
                    <button class="select-btn" onclick="orderProduct('${item.id}', '${item.name} - ${item.plan} (${item.duration})', '${formattedPrice} MMK')">Order</button>
                `;
                container.appendChild(card);
            });
        }

        function orderProduct(productId, fullTitle, price) {
            const payload = {
                product_id: productId,
                product_title: fullTitle,
                price: price
            };
            tg.sendData(JSON.stringify(payload));
        }

        fetchProducts();
    </script>
</body>
</html>
