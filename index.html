<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>J Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --card-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --button-color: var(--tg-theme-button-color, #2481cc);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        h2 { margin-top: 0; font-size: 20px; text-align: center; }
        .loading { text-align: center; padding: 40px 0; color: var(--hint-color); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .card:active { transform: scale(0.98); }
        .card img {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 6px;
        }
        .card h3 { margin: 0 0 4px 0; font-size: 15px; word-break: break-word; }
        .duration { font-size: 11px; color: var(--hint-color); margin-bottom: 4px; }
        .price { font-weight: bold; color: var(--button-color); margin-top: 4px; font-size: 14px; }

        .back-btn {
            background: transparent;
            border: none;
            color: var(--button-color);
            font-size: 15px;
            cursor: pointer;
            padding: 8px 0;
            margin-bottom: 12px;
            display: none;
        }

        .detail-view { display: none; background-color: var(--card-bg); padding: 18px; border-radius: 12px; }
        .note-box {
            background-color: #fff8e1;
            border-left: 4px solid #ffc107;
            color: #5c3c00;
            padding: 10px 12px;
            font-size: 12px;
            border-radius: 6px;
            margin: 14px 0;
            text-align: left;
            line-height: 1.4;
        }

        .input-group { margin-top: 14px; text-align: left; }
        .input-group label { font-size: 12px; color: var(--hint-color); display: block; margin-bottom: 6px; }
        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }
    </style>
</head>
<body>

<button id="backBtn" class="back-btn" onclick="showCategories()">← Back to Categories</button>
<h2 id="title">Categories</h2>
<div id="loading" class="loading">Loading products...</div>

<div id="categoryGrid" class="grid"></div>
<div id="productGrid" class="grid" style="display: none;"></div>

<div id="detailView" class="detail-view">
    <div style="text-align: center;">
        <img id="detailLogo" src="" style="width: 64px; height: 64px; border-radius: 12px; display: none; object-fit: cover; margin-bottom: 8px;" onerror="this.style.display='none'">
        <h3 id="productTitle" style="margin: 4px 0;"></h3>
        <div id="productDuration" class="duration" style="font-size: 13px;"></div>
        <div id="productPrice" class="price" style="font-size: 18px; margin-top: 6px;"></div>
    </div>

    <div id="noteBox" class="note-box" style="display:none;"></div>
    
    <div class="input-group">
        <label for="accountData">Account ID / Email / Phone / Remarks:</label>
        <input type="text" id="accountData" placeholder="ဝယ်ယူမည့် အကောင့်အချက်အလက်ထည့်ပါ...">
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8872507193:AAFzPJBbCG2pjLtBDvtSakBUqEYKLbHdGks";
    const API_URL = "https://script.google.com/macros/s/AKfycbya__sa_PI_8-tjrxz3BDhtJzOUVTgAIGaUyuG5k7XpWVx_PddL4ZkBqjukQlqoh7MY/exec";
    const QR_IMAGE_URL = "https://kitobokuta.github.io/digital-product-ui/qr.jpg";

    let rawData = [];
    let selectedProduct = null;

    async function fetchProducts() {
        try {
            const response = await fetch(API_URL);
            rawData = await response.json();
            document.getElementById('loading').style.display = 'none';
            showCategories();
        } catch (error) {
            document.getElementById('loading').innerText = "Error loading data!";
        }
    }

    function showCategories() {
        document.getElementById('title').innerText = "Categories";
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('categoryGrid').style.display = 'grid';
        document.getElementById('productGrid').style.display = 'none';
        document.getElementById('detailView').style.display = 'none';
        tg.MainButton.hide();

        const categories = [...new Set(rawData.map(item => item.category || "Other"))];
        const container = document.getElementById('categoryGrid');
        container.innerHTML = '';

        categories.forEach(cat => {
            const firstItem = rawData.find(i => i.category === cat);
            const logoHtml = firstItem && firstItem.logo ? `<img src="${firstItem.logo}" alt="logo" onerror="this.style.display='none'">` : '';
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `${logoHtml}<h3>${cat}</h3>`;
            card.onclick = () => showProducts(cat);
            container.appendChild(card);
        });
    }

    function showProducts(category) {
        document.getElementById('title').innerText = category;
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('categoryGrid').style.display = 'none';
        document.getElementById('productGrid').style.display = 'grid';
        document.getElementById('detailView').style.display = 'none';
        tg.MainButton.hide();

        const products = rawData.filter(item => (item.category || "Other") === category);
        const container = document.getElementById('productGrid');
        container.innerHTML = '';

        products.forEach(prod => {
            const logoHtml = prod.logo ? `<img src="${prod.logo}" alt="logo" onerror="this.style.display='none'">` : '';
            const durationHtml = prod.duration ? `<div class="duration">⏱ ${prod.duration}</div>` : '';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                ${logoHtml}
                <h3>${prod.name || 'Plan'}</h3>
                ${durationHtml}
                <div class="price">${prod.price ? prod.price + ' MMK' : 'Free / Contact'}</div>
            `;
            card.onclick = () => showDetail(prod);
            container.appendChild(card);
        });
    }

    function showDetail(product) {
        selectedProduct = product;
        document.getElementById('title').innerText = "Confirm Order";
        document.getElementById('productGrid').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';

        const logoImg = document.getElementById('detailLogo');
        if (product.logo) {
            logoImg.src = product.logo;
            logoImg.style.display = 'inline-block';
        } else {
            logoImg.style.display = 'none';
        }

        document.getElementById('productTitle').innerText = `${product.category} - ${product.name}`;
        document.getElementById('productDuration').innerText = product.duration ? `Duration: ${product.duration}` : '';
        document.getElementById('productPrice').innerText = `${product.price} MMK`;

        const noteBox = document.getElementById('noteBox');
        if (product.description && product.description.trim() !== "") {
            noteBox.innerHTML = `📌 <b>Condition / Note:</b><br>${product.description}`;
            noteBox.style.display = 'block';
        } else {
            noteBox.style.display = 'none';
        }

        tg.MainButton.setText(`ORDER NOW (${product.price} MMK)`);
        tg.MainButton.show();
        
        tg.MainButton.offClick(sendOrder);
        tg.MainButton.onClick(sendOrder);
    }

    async function sendOrder() {
        if (!selectedProduct) return;
        
        const userInput = document.getElementById('accountData').value;
        const fullDuration = selectedProduct.duration ? ` - ${selectedProduct.duration}` : '';
        const fullItemName = `${selectedProduct.category} (${selectedProduct.name}${fullDuration})`;
        const price = selectedProduct.price;
        const orderId = `ORD-${Math.floor(100000000 + Math.random() * 900000000)}`;

        const user = tg.initDataUnsafe?.user;
        const chatId = user?.id;

        const captionText = `🛒 <b>Order ID:</b> <code>${orderId}</code>\n` +
                            `<b>Item:</b> ${fullItemName}\n` +
                            `<b>Price:</b> ${price} MMK\n` +
                            `<b>Account/Note:</b> ${userInput || '-'}\n\n` +
                            `📷 <b>ငွေလွှဲပြေစာ နှင့်တကွ နောက်ဆုံး ဂဏန်း ၆ လုံးကို ပို့ပေးပါခဗျာ။</b>`;

        // 1. Direct Telegram Bot API sendPhoto (Primary for Inline WebApp)
        if (chatId) {
            let photoSent = false;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        photo: QR_IMAGE_URL,
                        caption: captionText,
                        parse_mode: 'HTML'
                    })
                });
                const resData = await res.json();
                if (resData.ok) photoSent = true;
            } catch (err) {
                console.error("Direct API Photo Error:", err);
            }

            // Fallback: Send Text Message if Photo fetch failed
            if (!photoSent) {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: captionText,
                            parse_mode: 'HTML'
                        })
                    });
                } catch (err) {
                    console.error("Direct API Message Error:", err);
                }
            }
        }

        // 2. Reply Keyboard sendData fallback
        try {
            const payload = {
                order_id: orderId,
                product_id: selectedProduct.id,
                full_item_name: fullItemName,
                price: price,
                customer_note: userInput || "-"
            };
            tg.sendData(JSON.stringify(payload));
        } catch (e) {
            console.error("sendData Error:", e);
        }

        tg.close();
    }

    fetchProducts();
</script>
</body>
</html>
