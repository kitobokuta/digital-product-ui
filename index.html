<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Products Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #loading {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-top: 20px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }
        .product-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .price {
            font-size: 18px;
            color: #e74c3c;
            font-weight: bold;
            margin: 10px 0;
        }
        .note {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>

    <h1>Digital Products Price List</h1>
    <div id="loading">ဒေတာများ ရယူနေပါသည် ခဏစောင့်ပါ...</div>
    <div class="product-grid" id="product-container"></div>

    <script src="script.js"></script>
</body>
</html>
