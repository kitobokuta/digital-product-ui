!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jupiter Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #888888);
            --card-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --button-color: var(--tg-theme-button-color, #2481cc);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        h2 { margin-top: 0; font-size: 20px; text-align: center; }
        .loading { text-align: center; padding: 40px 0; color: var(--hint-color); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card:active { transform: scale(0.98); }
        .card img {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 8px;
            background-color: rgba(0,0,0,0.03);
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .card h3 { margin: 0 0 4px 0; font-size: 15px; word-break: break-word; }
        .duration { font-size: 11px; color: var(--hint-color); margin-bottom: 4px; }
        .price { font-weight: bold; color: var(--button-color); margin-top: 4px; font-size: 14px; }

        .back-btn {
            background: transparent;
            border: none;
            color: var(--button-color);
            font-size: 15px;
            cursor: pointer;
            padding: 8px 0;
            margin-bottom: 12px;
            display: none;
            font-weight: 500;
        }

        .detail-view { display: none; background-color: var(--card-bg); padding: 18px; border-radius: 12px; }
        .note-box {
            background-color: #fff8e1;
            border-left: 4px solid #ffc107;
            color: #5c3c00;
            padding: 10px 12px;
            font-size: 12px;
            border-radius: 6px;
            margin: 14px 0;
            text-align: left;
            line-height: 1.4;
        }

        .input-group { margin-top: 14px; text-align: left; }
        .input-group label { font-size: 12px; color: var(--hint-color); display: block; margin-bottom: 6px; }
        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }
    </style>
</head>
<body>

<button id="backBtn" class="back-btn" onclick="showProducts()">← Back to Products</button>
<h2 id="title">Jupiter Store</h2>
<div id="loading" class="loading">Loading products...</div>

<div id="productGrid" class="grid"></div>
<div id="categoryGrid" class="grid" style="display: none;"></div>

<div id="detailView" class="detail-view">
    <div style="text-align: center;">
        <img id="detailLogo" src="" style="width: 64px; height: 64px; border-radius: 14px; object-fit: cover; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h3 id="productTitle" style="margin: 4px 0;"></h3>
        <div id="productDuration" class="duration" style="font-size: 13px;"></div>
        <div id="productPrice" class="price" style="font-size: 18px; margin-top: 6px;"></div>
    </div>

    <div id="noteBox" class="note-box" style="display:none;"></div>
    
    <div class="input-group">
        <label for="accountData">Account ID / Email / Phone / Remarks:</label>
        <input type="text" id="accountData" placeholder="ဝယ်ယူမည့် အကောင့်အချက်အလက်ထည့်ပါ...">
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    try { tg.expand(); } catch(e){}

    const BOT_TOKEN = "8872507193:AAFzPJBbCG2pjLtBDvtSakBUqEYKLbHdGks";
    const API_URL = "https://script.google.com/macros/s/AKfycbwP_TEF7E2KAozHJg01lXOmTvjIvxKM-_1GkD4RSI-sAGAcvZ46A5SI-74csbcwnZM/exec";
    const QR_IMAGE_URL = "https://kitobokuta.github.io/digital-product-ui/qr.jpg";

    let rawData = [];
    let selectedProduct = null;

    function getProp(obj, keys) {
        if (!obj) return "";
        for (let k of keys) {
            for (let prop in obj) {
                if (prop.toLowerCase() === k.toLowerCase()) {
                    let val = obj[prop];
                    if (val !== undefined && val !== null && String(val).trim() !== "") {
                        return String(val).trim();
                    }
                }
            }
        }
        return "";
    }

    function getSvgInitialsLogo(text) {
        const initial = (text || "J").trim().charAt(0).toUpperCase();
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
            <rect width="100" height="100" rx="22" fill="url(#blueGrad)"/>
            <defs>
                <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2481cc"/>
                    <stop offset="100%" stop-color="#0056b3"/>
                </linearGradient>
            </defs>
            <text x="50%" y="55%" font-family="-apple-system, Roboto, sans-serif" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">${initial}</text>
        </svg>`;
        return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
    }

    function resolveLogo(item, categoryName) {
        if (!item) return getSvgInitialsLogo(categoryName);
        let logoVal = getProp(item, ["logo", "image", "img", "photo"]);
        if (logoVal !== "") {
            if (logoVal.startsWith("http://") || logoVal.startsWith("https://") || logoVal.startsWith("data:")) {
                return logoVal;
            }
            if (!logoVal.startsWith("images/")) {
                logoVal = "images/" + logoVal;
            }
            return logoVal;
        }
        const titleForInitial = getProp(item, ["name", "title"]) || categoryName || "Product";
        return getSvgInitialsLogo(titleForInitial);
    }

    async function fetchProducts() {
        try {
            const timestampUrl = API_URL + (API_URL.includes("?") ? "&" : "?") + "_t=" + new Date().getTime();
            const response = await fetch(timestampUrl, { redirect: "follow" });
            if (!response.ok) throw new Error("Network response was not ok");
            
            rawData = await response.json();
            console.log("Fetched Raw Data:", rawData);

            if (!Array.isArray(rawData) || rawData.length === 0) {
                document.getElementById('loading').innerText = "No products found in Google Sheet!";
                return;
            }

            document.getElementById('loading').style.display = 'none';
            showProducts();
        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('loading').innerHTML = "⚠️ Error loading data!<br><span style='font-size:12px; color:var(--hint-color);'>Google Apps Script Deploy (New Version) ပြန်လုပ်ပေးရန် လိုအပ်ပါသည်။</span>";
        }
    }

    function showProducts() {
        document.getElementById('title').innerText = "Jupiter Store";
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('productGrid').style.display = 'grid';
        document.getElementById('categoryGrid').style.display = 'none';
        document.getElementById('detailView').style.display = 'none';
        try { tg.MainButton.hide(); } catch(e){}

        const container = document.getElementById('productGrid');
        container.innerHTML = '';

        rawData.forEach((prod, index) => {
            const prodName = getProp(prod, ["name", "title"]) || 'Plan';
            const prodPrice = getProp(prod, ["price", "cost"]) || '0';
            const prodDuration = getProp(prod, ["duration", "time"]) || '';
            const prodCat = getProp(prod, ["category", "cat"]) || 'Product';

            const logoSrc = resolveLogo(prod, prodCat);
            const fallbackSrc = getSvgInitialsLogo(prodName);
            const durationHtml = prodDuration ? `<div class="duration">⏱ ${prodDuration}</div>` : '';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${logoSrc}" alt="${prodName}" onerror="this.onerror=null; this.src='${fallbackSrc}';">
                <h3>${prodName}</h3>
                ${durationHtml}
                <div class="price">${prodPrice} MMK</div>
            `;
            card.onclick = () => showCategoriesOrDetail(prod);
            container.appendChild(card);
        });
    }

    function showCategoriesOrDetail(product) {
        const prodName = getProp(product, ["name", "title"]);
        const matchedItems = rawData.filter(i => getProp(i, ["name", "title"]) === prodName);

        if (matchedItems.length > 1) {
            document.getElementById('title').innerText = prodName;
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('productGrid').style.display = 'none';
            document.getElementById('categoryGrid').style.display = 'grid';
            document.getElementById('detailView').style.display = 'none';
            try { tg.MainButton.hide(); } catch(e){}

            const container = document.getElementById('categoryGrid');
            container.innerHTML = '';

            matchedItems.forEach(item => {
                const itemCat = getProp(item, ["category", "cat"]) || 'Option';
                const itemPrice = getProp(item, ["price", "cost"]) || '0';
                const itemDuration = getProp(item, ["duration", "time"]) || '';
                const logoSrc = resolveLogo(item, itemCat);
                const fallbackSrc = getSvgInitialsLogo(itemCat);
                const durationHtml = itemDuration ? `<div class="duration">⏱ ${itemDuration}</div>` : '';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${logoSrc}" alt="${itemCat}" onerror="this.onerror=null; this.src='${fallbackSrc}';">
                    <h3>${itemCat}</h3>
                    ${durationHtml}
                    <div class="price">${itemPrice} MMK</div>
                `;
                card.onclick = () => showDetail(item);
                container.appendChild(card);
            });
        } else {
            showDetail(product);
        }
    }

    function showDetail(product) {
        selectedProduct = product;
        document.getElementById('title').innerText = "Confirm Order";
        document.getElementById('productGrid').style.display = 'none';
        document.getElementById('categoryGrid').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';

        const prodName = getProp(product, ["name", "title"]) || 'Plan';
        const prodCat = getProp(product, ["category", "cat"]) || 'Product';
        const prodPrice = getProp(product, ["price", "cost"]) || '0';
        const prodDuration = getProp(product, ["duration", "time"]) || '';
        const prodDesc = getProp(product, ["description", "desc", "note"]) || '';

        const logoImg = document.getElementById('detailLogo');
        const logoSrc = resolveLogo(product, prodCat);
        const fallbackSrc = getSvgInitialsLogo(prodName);
        
        logoImg.src = logoSrc;
        logoImg.onerror = function() {
            this.onerror = null;
            this.src = fallbackSrc;
        };

        document.getElementById('productTitle').innerText = `${prodCat} - ${prodName}`;
        document.getElementById('productDuration').innerText = prodDuration ? `Duration: ${prodDuration}` : '';
        document.getElementById('productPrice').innerText = `${prodPrice} MMK`;

        const noteBox = document.getElementById('noteBox');
        if (prodDesc && String(prodDesc).trim() !== "") {
            noteBox.innerHTML = `📌 <b>Condition / Note:</b><br>${prodDesc}`;
            noteBox.style.display = 'block';
        } else {
            noteBox.style.display = 'none';
        }

        try {
            tg.MainButton.setText(`ORDER NOW (${prodPrice} MMK)`);
            tg.MainButton.show();
            tg.MainButton.offClick(sendOrder);
            tg.MainButton.onClick(sendOrder);
        } catch(e){}
    }

    async function sendOrder() {
        if (!selectedProduct) return;
        
        const userInput = document.getElementById('accountData').value;
        const prodName = getProp(selectedProduct, ["name", "title"]) || 'Plan';
        const prodCat = getProp(selectedProduct, ["category", "cat"]) || 'Product';
        const prodPrice = getProp(selectedProduct, ["price", "cost"]) || '0';
        const prodDuration = getProp(selectedProduct, ["duration", "time"]) || '';

        const fullDuration = prodDuration ? ` - ${prodDuration}` : '';
        const fullItemName = `${prodCat} (${prodName}${fullDuration})`;
        const orderId = `ORD-${Math.floor(100000000 + Math.random() * 900000000)}`;

        const user = tg.initDataUnsafe?.user;
        const chatId = user?.id;

        const captionText = `🛒 <b>Order ID:</b> <code>${orderId}</code>\n` +
                            `<b>Item:</b> ${fullItemName}\n` +
                            `<b>Price:</b> ${prodPrice} MMK\n` +
                            `<b>Account/Note:</b> ${userInput || '-'}\n\n` +
                            `📷 <b>ငွေလွှဲပြေစာ နှင့်တကွ နောက်ဆုံး ဂဏန်း ၆ လုံးကို ပို့ပေးပါခဗျာ။</b>`;

        if (chatId) {
            let photoSent = false;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        photo: QR_IMAGE_URL,
                        caption: captionText,
                        parse_mode: 'HTML'
                    })
                });
                const resData = await res.json();
                if (resData.ok) photoSent = true;
            } catch (err) {
                console.error("Direct API Photo Error:", err);
            }

            if (!photoSent) {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: captionText,
                            parse_mode: 'HTML'
                        })
                    });
                } catch (err) {
                    console.error("Direct API Message Error:", err);
                }
            }
        }

        try {
            const payload = {
                order_id: orderId,
                product_id: getProp(selectedProduct, ["id", "ID"]) || '',
                full_item_name: fullItemName,
                price: prodPrice,
                customer_note: userInput || "-"
            };
            tg.sendData(JSON.stringify(payload));
        } catch (e) {
            console.error("sendData Error:", e);
        }

        try { tg.close(); } catch(e){}
    }

    fetchProducts();
</script>
</body>
</html>
