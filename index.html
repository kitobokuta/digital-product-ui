<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jupiter Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #07090e !important;
            color: #ffffff !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .store-header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1.store-title {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
        }
        .store-subtitle {
            font-size: 9px;
            color: #b0bec5;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: none;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #8b9bb4;
            font-size: 13px;
        }
        /* Grid Layout ကို သေချာစေရန် */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 48%;
            padding: 12px 8px;
            box-sizing: border-box;
            text-align: center;
            cursor: pointer;
            position: relative;
            margin-bottom: 10px;
        }
        .card-number {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 10px;
            color: #8b9bb4;
            font-weight: bold;
        }
        .card-img-wrap {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #21262d;
            margin: 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .card img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }
        .card h3 {
            margin: 4px 0;
            font-size: 12px;
            color: #f0f6fc;
            word-break: break-word;
        }
        .duration {
            font-size: 9px;
            color: #ff4757;
            font-weight: bold;
            margin: 2px 0;
        }
        .price {
            font-size: 11px;
            color: #58a6ff;
            font-weight: bold;
        }
        .card-footer-ornament {
            font-size: 8px;
            color: #8b9bb4;
            margin-top: 4px;
        }
        .detail-view {
            display: none;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .detail-img-wrap {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #21262d;
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .detail-img-wrap img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }
        .note-box {
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #ffc107;
            color: #ffecb3;
            padding: 10px;
            font-size: 11px;
            text-align: left;
            margin: 12px 0;
            border-radius: 4px;
        }
        .input-group {
            text-align: left;
            margin-top: 10px;
        }
        .input-group label {
            font-size: 10px;
            color: #8b9bb4;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #ffffff;
            box-sizing: border-box;
            font-size: 13px;
            outline: none;
        }
        .trust-footer {
            margin-top: 20px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            font-size: 8px;
            color: #8b9bb4;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="store-header">
    <h1 class="store-title">JUPITER STORE</h1>
    <div class="store-subtitle">✦ PREMIUM DIGITAL PRODUCTS ✦</div>
</div>

<button id="backBtn" class="back-btn" onclick="goBack()">← Back</button>
<div id="loading" class="loading">Loading products...</div>

<div id="productGrid" class="grid"></div>
<div id="categoryGrid" class="grid" style="display: none;"></div>

<div id="detailView" class="detail-view">
    <div class="detail-img-wrap">
        <img id="detailLogo" src="" alt="Logo">
    </div>
    <h3 id="productTitle" style="font-size: 14px; color:#f0f6fc; margin: 4px 0;"></h3>
    <div id="productDuration" class="duration"></div>
    <div id="productPrice" class="price"></div>

    <div id="noteBox" class="note-box" style="display:none;"></div>
    
    <div class="input-group">
        <label for="accountData">Account ID / Email / Phone:</label>
        <input type="text" id="accountData" placeholder="အချက်အလက်ထည့်ပါ...">
    </div>
</div>

<div class="trust-footer">
    <div>🛡️ SAFE</div>
    <div>⚡ INSTANT</div>
    <div>🎖️ PREMIUM</div>
    <div>🎧 SUPPORT</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    try { tg.expand(); } catch(e){}

    const BOT_TOKEN = "8872507193:AAFzPJBbCG2pjLtBDvtSakBUqEYKLbHdGks";
    const API_URL = "https://script.google.com/macros/s/AKfycbxcdzIBPmwGxxI5CTDyaEfe7oulF8ckk_pR1-BenxLPs2lh1wnGposGdyJOCb63o1Z4/exec";
    const QR_IMAGE_URL = "https://kitobokuta.github.io/digital-product-ui/qr.jpg";

    const FALLBACK_PRODUCTS = [
        { product_id: "P1", name: "CapCut Pro", category: "Pro 1 Month", duration: "30 Days", price: "4500", description: "Full Pro Access", logo: "" },
        { product_id: "P2", name: "Spotify Premium", category: "Individual 1 Month", duration: "30 Days", price: "3500", description: "Upgrade your own account", logo: "" },
        { product_id: "P3", name: "Canva Pro", category: "1 Year Team Invite", duration: "365 Days", price: "5000", description: "Join via team link", logo: "" },
        { product_id: "P4", name: "Channel Boost", category: "Standard Package", duration: "Permanent", price: "8000", description: "Increase channel views", logo: "" }
    ];

    let rawData = [];
    let selectedProduct = null;
    let currentView = 'PRODUCTS';
    let lastSelectedProductName = '';

    function getProp(obj, keys) {
        if (!obj) return "";
        for (let k of keys) {
            for (let prop in obj) {
                if (prop.toLowerCase() === k.toLowerCase()) {
                    let val = obj[prop];
                    if (val !== undefined && val !== null && String(val).trim() !== "") {
                        return String(val).trim();
                    }
                }
            }
        }
        return "";
    }

    function getSvgInitialsLogo(text) {
        const initial = (text || "J").trim().charAt(0).toUpperCase();
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" rx="50" fill="#1f2937"/><text x="50%" y="54%" font-family="sans-serif" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">${initial}</text></svg>`;
        return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
    }

    function resolveLogo(item, categoryName) {
        if (!item) return getSvgInitialsLogo(categoryName);
        let logoVal = getProp(item, ["logo", "image", "img", "photo"]);
        if (logoVal !== "") {
            if (logoVal.startsWith("http://") || logoVal.startsWith("https://") || logoVal.startsWith("data:")) return logoVal;
            if (!logoVal.startsWith("images/")) logoVal = "images/" + logoVal;
            return logoVal;
        }
        return getSvgInitialsLogo(getProp(item, ["name", "title"]) || categoryName || "Product");
    }

    async function fetchProducts() {
        try {
            const response = await fetch(API_URL + "?_t=" + new Date().getTime(), { redirect: "follow" });
            const jsonRes = await response.json();
            rawData = (Array.isArray(jsonRes) && jsonRes.length > 0) ? jsonRes : FALLBACK_PRODUCTS;
        } catch (error) {
            rawData = FALLBACK_PRODUCTS;
        }
        document.getElementById('loading').style.display = 'none';
        showProducts();
    }

    function showProducts() {
        currentView = 'PRODUCTS';
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('productGrid').style.display = 'flex';
        document.getElementById('categoryGrid').style.display = 'none';
        document.getElementById('detailView').style.display = 'none';
        try { tg.MainButton.hide(); } catch(e){}

        const container = document.getElementById('productGrid');
        container.innerHTML = '';

        const uniqueProductsMap = new Map();
        rawData.forEach((prod) => {
            const prodName = getProp(prod, ["name", "title"]) || '';
            const lowerName = prodName.toLowerCase();
            if (!prodName || lowerName.includes("supplier") || lowerName === "name") return;
            if (!uniqueProductsMap.has(prodName)) uniqueProductsMap.set(prodName, prod);
        });

        let index = 1;
        uniqueProductsMap.forEach((prod, prodName) => {
            const logoSrc = resolveLogo(prod, prodName);
            const fallbackSrc = getSvgInitialsLogo(prodName);

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-number">${index < 10 ? '0' + index : index}</div>
                <div class="card-img-wrap">
                    <img src="${logoSrc}" alt="${prodName}" onerror="this.onerror=null; this.src='${fallbackSrc}';">
                </div>
                <h3>${prodName}</h3>
                <div class="card-footer-ornament">✦ ✦ ✦</div>
            `;
            card.onclick = () => showVariants(prodName);
            container.appendChild(card);
            index++;
        });
    }

    function showVariants(prodName) {
        currentView = 'VARIANTS';
        lastSelectedProductName = prodName;
        const matchedItems = rawData.filter(i => getProp(i, ["name", "title"]) === prodName);

        if (matchedItems.length > 0) {
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('productGrid').style.display = 'none';
            document.getElementById('categoryGrid').style.display = 'flex';
            document.getElementById('detailView').style.display = 'none';
            try { tg.MainButton.hide(); } catch(e){}

            const container = document.getElementById('categoryGrid');
            container.innerHTML = '';

            matchedItems.forEach((item, index) => {
                const itemCat = getProp(item, ["category", "cat"]) || prodName;
                const itemPrice = getProp(item, ["price", "cost"]) || '0';
                const itemDuration = getProp(item, ["duration", "time"]) || '';
                const logoSrc = resolveLogo(item, itemCat);
                const fallbackSrc = getSvgInitialsLogo(itemCat);
                const durationHtml = itemDuration ? `<div class="duration">⏱ ${itemDuration}</div>` : '';
                const cardNum = (index + 1) < 10 ? '0' + (index + 1) : (index + 1);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-number">${cardNum}</div>
                    <div class="card-img-wrap">
                        <img src="${logoSrc}" alt="${itemCat}" onerror="this.onerror=null; this.src='${fallbackSrc}';">
                    </div>
                    <h3>${itemCat}</h3>
                    ${durationHtml}
                    <div class="price">${itemPrice} MMK</div>
                    <div class="card-footer-ornament">✦ ✦ ✦</div>
                `;
                card.onclick = () => showDetail(item);
                container.appendChild(card);
            });
        }
    }

    function showDetail(product) {
        currentView = 'DETAIL';
        selectedProduct = product;
        document.getElementById('productGrid').style.display = 'none';
        document.getElementById('categoryGrid').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';

        const prodName = getProp(product, ["name", "title"]) || 'Plan';
        const prodCat = getProp(product, ["category", "cat"]) || '';
        const prodPrice = getProp(product, ["price", "cost"]) || '0';
        const prodDuration = getProp(product, ["duration", "time"]) || '';
        const prodDesc = getProp(product, ["description", "desc", "note"]) || '';

        const logoImg = document.getElementById('detailLogo');
        logoImg.src = resolveLogo(product, prodName);
        logoImg.onerror = function() { this.onerror = null; this.src = getSvgInitialsLogo(prodName); };

        document.getElementById('productTitle.innerText = prodCat && prodCat !== prodName ? `${prodName} - ${prodCat}` : prodName;
        document.getElementById('productDuration').innerText = prodDuration ? `⏱ ${prodDuration}` : '';
        document.getElementById('productPrice').innerText = `${prodPrice} MMK`;

        const noteBox = document.getElementById('noteBox');
        if (prodDesc && String(prodDesc).trim() !== "") {
            noteBox.innerHTML = `📌 <b>Note:</b><br>${prodDesc}`;
            noteBox.style.display = 'block';
        } else {
            noteBox.style.display = 'none';
        }

        try {
            tg.MainButton.setText(`ORDER NOW (${prodPrice} MMK)`);
            tg.MainButton.show();
            tg.MainButton.offClick(sendOrder);
            tg.MainButton.onClick(sendOrder);
        } catch(e){}
    }

    function goBack() {
        if (currentView === 'DETAIL') showVariants(lastSelectedProductName);
        else if (currentView === 'VARIANTS') showProducts();
    }

    async function sendOrder() {
        if (!selectedProduct) return;
        const userInput = document.getElementById('accountData').value;
        const prodName = getProp(selectedProduct, ["name", "title"]) || 'Plan';
        const prodCat = getProp(selectedProduct, ["category", "cat"]) || '';
        const prodPrice = getProp(selectedProduct, ["price", "cost"]) || '0';
        const prodDuration = getProp(selectedProduct, ["duration", "time"]) || '';

        const fullDuration = prodDuration ? ` - ${prodDuration}` : '';
        const fullItemName = (prodCat && prodCat !== prodName) ? `${prodName} (${prodCat}${fullDuration})` : `${prodName}${fullDuration}`;
        const orderId = `ORD-${Math.floor(100000000 + Math.random() * 900000000)}`;
        const chatId = tg.initDataUnsafe?.user?.id;

        const captionText = `🛒 <b>Order ID:</b> <code>${orderId}</code>\n` +
                            `<b>Item:</b> ${fullItemName}\n` +
                            `<b>Price:</b> ${prodPrice} MMK\n` +
                            `<b>Account/Note:</b> ${userInput || '-'}\n\n` +
                            `📷 <b>ငွေလွှဲပြေစာ နှင့်တကွ ပို့ပေးပါခဗျာ။</b>`;

        if (chatId) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, photo: QR_IMAGE_URL, caption: captionText, parse_mode: 'HTML' })
                });
            } catch (err) {}
        }

        try {
            tg.sendData(JSON.stringify({ order_id: orderId, full_item_name: fullItemName, price: prodPrice, customer_note: userInput || "-" }));
        } catch (e) {}
        try { tg.close(); } catch(e){}
    }

    fetchProducts();
</script>
</body>
</html>
