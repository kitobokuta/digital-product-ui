<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupiter Store</title>
    <style>
        body {
            background-color: #070a13;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
        }

        .store-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .store-header h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .store-header p {
            margin: 0;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* ပထမပုံစံအတိုင်း ၂ ကော်လံ Grid ဒီဇိုင်း */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 450px;
            margin: 0 auto;
        }

        /* ကတ်ပြားဒီဇိုင်း */
        .product-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 18px 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        .product-number {
            font-size: 11px;
            color: #64748b;
            text-align: left;
            margin-bottom: 10px;
            padding-left: 6px;
        }

        .product-icon {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle, #1e293b 0%, #0b0f19 100%);
            border: 2px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.1);
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .product-footer {
            font-size: 12px;
            color: #f59e0b; /* ရွှေရောင်ဘုရင်သရဖူ 👑 */
        }

        /* Loading အခြေအနေအတွက် */
        .loading-state {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="store-header">
        <h2>JUPITER STORE</h2>
        <p>✦ PREMIUM DIGITAL PRODUCTS ✦</p>
    </div>

    <!-- ထုတ်ကုန်များပေါ်လာမည့် Container -->
    <div id="shop-container">
        <div class="loading-state">Loading products...</div>
    </div>

    <script>
        // သင့်ရဲ့ Backend သို့မဟုတ် API မှ ဒေတာခေါ်ယူသည့် ပုံစံဥပမာ
        async function loadStoreProducts() {
            const container = document.getElementById('shop-container');

            try {
                // ကိုယ့်ရဲ့ API Endpoint လိပ်စာကို ဒီနေရာမှာ ထည့်ပါ
                // ဥပမာ: let response = await fetch('https://your-api.com/products');
                // let products = await response.json();

                // ဒီနေရာမှာတော့ ဒေတာရောက်လာပြီဟု ယူဆပြီး နမူနာဒေတာဖြင့် စမ်းပြထားပါတယ်
                setTimeout(() => {
                    const products = [
                        { name: "CapCut Pro", icon: "C" },
                        { name: "Spotify Premium", icon: "S" },
                        { name: "Canva Pro", icon: "C" },
                        { name: "Channel Boost", icon: "C" },
                        { name: "Jump Jump VPN", icon: "J" },
                        { name: "Hiddify / V2BOX VPN", icon: "H" }
                    ];

                    renderProducts(products);
                }, 1000); // 1 စက္ကန့်ကြာ Loading ပြပြီးပါက Grid ပုံစံပြောင်းသွားမည်

            } catch (error) {
                container.innerHTML = `<div class="loading-state" style="color: #ef4444;">Failed to load products.</div>`;
            }
        }

        // ကတ်ပြားများကို HTML ဖွဲ့စည်းတည်ဆောက်ပေးသော Function
        function renderProducts(items) {
            const container = document.getElementById('shop-container');

            if (!items || items.length === 0) {
                container.innerHTML = `<div class="loading-state">No products found.</div>`;
                return;
            }

            let htmlContent = '<div class="products-grid">';

            items.forEach((item, index) => {
                let formattedNum = String(index + 1).padStart(2, '0');
                htmlContent += `
                    <div class="product-card">
                        <div class="product-number">${formattedNum}</div>
                        <div class="product-icon">${item.icon}</div>
                        <div class="product-name">${item.name}</div>
                        <div class="product-footer">👑</div>
                    </div>
                `;
            });

            htmlContent += '</div>';
            container.innerHTML = htmlContent;
        }

        // စတင် လုပ်ဆောင်ရန် ခေါ်ဆိုခြင်း
        loadStoreProducts();
    </script>

</body>
</html>
